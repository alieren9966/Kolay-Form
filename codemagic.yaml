workflows:
  capacitor-ios-workflow:
    name: Capacitor iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Developer Connection # Codemagic UI'da bagladiginiz Apple Developer Entegrasyonunun adi
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: tr.com.kolayform
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Sync Capacitor web assets & plugins
        script: |
          npm run sync
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
